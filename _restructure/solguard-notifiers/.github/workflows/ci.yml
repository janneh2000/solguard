name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check src/ || true
      - name: Syntax check
        run: |
          python -m py_compile src/server.py src/signing.py \
            src/telegram_client.py src/discord_client.py
      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t solguard-notifiers:ci .
