name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML validity
        run: |
          # Minimal syntactic check — docs.pypi-free quick sanity
          python3 - <<'PY'
          import html.parser, sys
          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()
          class Checker(html.parser.HTMLParser):
              def error(self, message):
                  print("HTML parse error:", message)
                  sys.exit(1)
          Checker().feed(content)
          print("HTML parsed OK ({} bytes)".format(len(content)))
          PY

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t solguard-dashboard:ci .
